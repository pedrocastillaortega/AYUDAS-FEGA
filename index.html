<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión Ayudas FEGA — Tren de Borrascas 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<script>
// ================= CONFIG =================
let config = {
  apiUrl: "https://script.google.com/macros/s/AKfycbzCzPyAZpLc12YZq9Yqdiz-7SZ231XPdyhLnCOSC4hajKRUCOxxULaIlz_wSlZt5GB1/exec",
  githubRepo: "pedrocastillaortega/AYUDAS-FEGA",
  githubToken: null
};

// ================= TOKEN =================
function askGithubToken() {
  let token = sessionStorage.getItem("githubToken");

  if (!token) {
    token = prompt("Introduce tu token de GitHub:");

    if (!token) {
      alert("Sin token no puedes usar la app");
      return;
    }

    sessionStorage.setItem("githubToken", token);
  }

  config.githubToken = token;
}

// ================= INIT =================
window.addEventListener("DOMContentLoaded", () => {
  askGithubToken();
  fetchSocios();
});

// ================= EJEMPLO USO =================
async function uploadToGithub(filePath, fileContent, commitMessage) {
  if (!config.githubToken) {
    alert("Falta token de GitHub");
    return false;
  }

  const apiUrl = `https://api.github.com/repos/${config.githubRepo}/contents/${filePath}`;

  const body = {
    message: commitMessage,
    content: fileContent
  };

  const res = await fetch(apiUrl, {
    method: "PUT",
    headers: {
      "Authorization": "token " + config.githubToken,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });

  return res.ok;
}

// ================= MOCK =================
async function fetchSocios() {
  console.log("App iniciada con token dinámico");
}
</script>

</body>
</html>
